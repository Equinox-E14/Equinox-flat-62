<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow">
<title>Equinox · Island Gardens · E14</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;font-size:16px}
body{background:#4E5C4C;color:#2C2D31;font-family:'Outfit',sans-serif;font-weight:300;line-height:1.75;overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{display:block;width:100%;height:auto}
a{color:inherit;text-decoration:none}

:root{
  --sage:        #879884;
  --sage-dark:   #6B7A68;
  --sage-deeper: #4E5C4C;
  --malm:        #2C2D31;
  --malm-deep:   #1E1F23;
  --oak:         #C19A6B;
  --oak-dark:    #A07848;
  --bramble:     #6B5A40;
  --alabaster:   #F9F8F6;
  --cream:       #F0EDE6;
  --rule:        rgba(44,45,49,0.12);
  --serif: 'Cormorant', Georgia, serif;
  --sans:  'Outfit', sans-serif;
  --text-dark:   #1E1F23;
  --text-light:  #F9F8F6;
}

/* ── HERO ───────────────────────────────── */
.hero{
  position:relative;
  height:100svh;
  display:flex;flex-direction:column;justify-content:flex-end;
  overflow:hidden;
  background-color:#2A3028;
  background-image:url('https://lh3.googleusercontent.com/d/1tVAwpytPiZ5zx9dSTafwB1ez489VsUpY');
  background-size:cover;background-position:center 40%;
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(28,30,26,.92) 0%,rgba(28,30,26,.35) 55%,rgba(28,30,26,.1) 100%);
}
.hero-content{
  position:relative;z-index:2;
  padding:40px 24px 48px;
  animation:fadeUp 1.4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.hero-eyebrow{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--oak);margin-bottom:14px;
  animation:fadeUp 1.4s .1s cubic-bezier(.16,1,.3,1) both;
}
.hero-title{
  font-family:var(--serif);font-weight:300;
  font-size:clamp(34px,9vw,52px);
  line-height:1.1;color:var(--alabaster);margin-bottom:16px;
  animation:fadeUp 1.4s .2s cubic-bezier(.16,1,.3,1) both;
}
.hero-title em{font-style:italic;color:rgba(249,248,246,.5)}
.hero-sub{
  font-size:14px;line-height:1.7;
  color:rgba(249,248,246,.7);
  border-left:2px solid var(--oak);padding-left:14px;
  max-width:320px;margin-bottom:28px;
  animation:fadeUp 1.4s .3s cubic-bezier(.16,1,.3,1) both;
}
.hero-pills{
  display:flex;gap:8px;flex-wrap:wrap;
  animation:fadeUp 1.4s .4s cubic-bezier(.16,1,.3,1) both;
}
.hero-pill{
  font-size:10px;letter-spacing:.09em;text-transform:uppercase;
  color:rgba(249,248,246,.5);padding:4px 11px;
  border:1px solid rgba(249,248,246,.18);
}
.hero-nudge{
  position:absolute;bottom:0;left:0;right:0;
  height:56px;z-index:3;
  background:linear-gradient(to bottom,transparent,rgba(78,92,76,.6));
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;
}
.hero-nudge span{
  font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(249,248,246,.35);
  animation:bob 2.4s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

/* ── NAV ─────────────────────────────────── */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(107,122,104,.97);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(44,45,49,.2);
  height:50px;padding:0 20px;
  display:flex;align-items:center;gap:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav-brand{
  font-family:var(--serif);font-size:14px;
  color:var(--alabaster);white-space:nowrap;flex-shrink:0;margin-right:auto;padding-right:16px;
}
.nav-links{display:flex;gap:16px;align-items:center;flex-shrink:0}
.nav-links a{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(249,248,246,.75);white-space:nowrap;transition:color .2s;
}
.nav-links a:active{color:var(--oak)}

/* ── FEED CONTAINER ─────────────────────── */
.feed{
  display:flex;flex-direction:column;
  gap:3px;
  padding:3px 0 0;
}

/* ── FEED CARD ──────────────────────────── */
.card{
  background:var(--cream);
  position:relative;
  overflow:hidden;
}
.card.dark{background:var(--malm)}
.card.darker{background:var(--malm-deep)}
.card.mid{background:var(--sage-dark)}
.card.sage{background:var(--sage)}

/* ── CARD TEXT BLOCK & HIGH CONTRAST COLORS ── */
.ct{padding:28px 24px 20px}
.eyebrow{
  display:block;font-weight:500;
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--bramble);margin-bottom:10px;
}
.card.dark .eyebrow,
.card.darker .eyebrow,
.card.mid .eyebrow{ color:var(--oak) }
.card.sage .eyebrow{ color:var(--sage-deeper) }

h2.card-title{
  font-family:var(--serif);font-weight:300;
  font-size:clamp(28px,7vw,38px);
  line-height:1.12;letter-spacing:-.01em;
  color:var(--text-dark);margin-bottom:16px;
}
h2.card-title em{font-style:italic;color:var(--bramble)}
.card.dark h2.card-title,
.card.darker h2.card-title,
.card.mid h2.card-title{ color:var(--alabaster) }
.card.dark h2.card-title em,
.card.darker h2.card-title em,
.card.mid h2.card-title em{ color:rgba(249,248,246,.5) }

.card-lead{
  font-family:var(--serif);font-style:italic;
  font-size:16px;line-height:1.72;
  color:var(--bramble);margin-bottom:14px;
}
.card.dark .card-lead,
.card.darker .card-lead,
.card.mid .card-lead{ color:rgba(249,248,246,.65) }

/* Collapsed body */
.card-body{
  max-height:0;overflow:hidden;
  transition:max-height .5s cubic-bezier(.4,0,.2,1);
}
.card-body.open{ max-height:1400px }
.card-body-inner{padding:0 24px 20px}

p.body{font-size:15px;line-height:1.82;color:#1E1F23;margin-bottom:14px}
p.body:last-child{margin-bottom:0}
p.body.light{color:rgba(249,248,246,.72)}
p.body.muted{color:#1E1F23}

/* Read more toggle */
.read-more{
  display:flex;align-items:center;gap:8px;
  padding:10px 24px 20px;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--bramble);cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;transition:color .2s;
  background:none;border:none;width:100%;text-align:left;
  font-weight: 500;
}
.card.dark .read-more,
.card.darker .read-more,
.card.mid .read-more{ color:var(--oak) }
.card.sage .read-more{ color:var(--sage-deeper) }
.read-more:active{ color:var(--bramble) }
.read-more-icon{
  font-size:16px;line-height:1;
  transition:transform .35s ease;
  font-style:normal;
}
.read-more.open .read-more-icon{ transform:rotate(45deg) }

/* Pull quote */
.pq{
  border-left:2px solid var(--oak);
  padding:4px 0 4px 16px;
  margin:20px 24px;
}
.pq p{
  font-family:var(--serif);font-style:italic;
  font-size:18px;line-height:1.6;color:var(--malm);
}
.card.dark .pq p,
.card.darker .pq p,
.card.mid .pq p{ color:rgba(249,248,246,.82) }
.pq cite{
  display:block;margin-top:6px;
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--bramble);font-style:normal;
}
.card.dark .pq cite,
.card.mid .pq cite{ color:rgba(249,248,246,.32) }

/* ── EDITORIAL VENDOR MEMORY BRIDGE ──────── */
.featured-memory {
  background: var(--cream);
  padding: 48px 24px;
  position: relative;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.memory-container {
  max-width: 600px;
  margin: 0 auto;
}
.memory-quote {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(20px, 5.5vw, 24px);
  line-height: 1.6;
  color: var(--text-dark);
  margin-bottom: 20px;
  position: relative;
}
.memory-quote::before {
  content: "“";
  font-family: var(--serif);
  font-size: 80px;
  color: rgba(107, 90, 64, 0.12);
  position: absolute;
  top: -40px;
  left: -15px;
  line-height: 1;
}
.memory-meta {
  display: flex;
  align-items: center;
  gap: 12px;
}
.memory-line {
  height: 1px;
  width: 32px;
  background: var(--bramble);
}
.memory-author {
  font-size: 11px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--bramble);
  font-weight: 500;
}

/* ── CARD PHOTO ─────────────────────────── */
.card-photo{ position:relative;overflow:hidden }
.card-photo img{
  display:block;width:100%;height:auto;
  aspect-ratio:16/9;object-fit:cover;
}
.card-photo-caption{
  padding:14px 24px 16px;
  background:var(--malm-deep);
}
.card.sage .card-photo-caption,
.card.mid .card-photo-caption{ background:rgba(30,31,35,.95) }
.cpc-label{
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--oak);margin-bottom:4px;
}
.cpc-text{
  font-family:var(--serif);font-style:italic;
  font-size:14px;line-height:1.5;
  color:var(--text-light);
}

.photo-pair{
  display:grid;grid-template-columns:1fr 1fr;
  gap:3px;
}
.photo-pair .card-photo img{ aspect-ratio:4/3 }
.inline-photo{width:100%;overflow:hidden}
.inline-photo img{
  display:block;width:100%;
  aspect-ratio:16/9;object-fit:cover;
}

/* ── SPEC STRIP ─────────────────────────── */
.spec-strip{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:2px;background:rgba(249,248,246,.07);
  margin:0 0 4px;
}
.spec-cell{
  background:rgba(249,248,246,.04);
  padding:18px 12px;text-align:center;
}
.spec-val{
  font-family:var(--serif);font-size:30px;font-weight:300;
  color:var(--oak);line-height:1;margin-bottom:4px;
}
.spec-lbl{
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(249,248,246,.4);
}

/* ── VIEW TAGS ──────────────────────────── */
.view-tags{
  display:flex;gap:7px;flex-wrap:wrap;
  padding:0 24px 20px;
}
.vtag{
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-dark);padding:5px 12px;
  border:1px solid rgba(44,45,49,0.3);
  background:rgba(249,248,246,.55);
  font-weight: 400;
}

/* ── LIST ITEMS ─────────────────────────── */
.item-list{border-top:1px solid rgba(44,45,49,.15)}
.card.dark .item-list,
.card.darker .item-list,
.card.mid .item-list{ border-top-color:rgba(249,248,246,.1) }

.list-item{
  padding:18px 24px;
  border-bottom:1px solid rgba(44,45,49,.1);
}
.card.dark .list-item,
.card.darker .list-item,
.card.mid .list-item{ border-bottom-color:rgba(249,248,246,.07) }

.li-name{
  font-family:var(--serif);font-size:18px;font-weight:400;
  color:var(--text-dark);margin-bottom:3px;
  display:flex;justify-content:space-between;align-items:baseline;gap:8px;
}
.card.dark .li-name,
.card.darker .li-name,
